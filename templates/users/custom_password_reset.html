{% include 'Navbar.html' %}
<div class="reset-container">
    <form method="POST" class="reset-form">
        {% csrf_token %}

        <h2>Reset Password</h2>

        <div class="form-group">
            <label>Username or Email</label>
            {{ form.email }}
        </div>

        <button type="submit" class="reset-btn">
            Send Reset Link
        </button>
    </form>
</div>
