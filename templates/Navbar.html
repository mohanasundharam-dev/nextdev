{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/navbar.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

{% block navbar %}
<header>
    <div class="main-nav">
        <div class="logo">
            <img src="{% static 'images/logo1.jpg' %}" alt="Logo">
        </div>
        <div class="nav-link">
            <nav>
                <a href="{% url 'home' %}">Projects</a>
                <a href="">Developer</a>
                <a href="{% url 'CreateProject' %}">Add Project</a>

                {% if request.user.is_authenticated %}
                <a href="{% url 'LogoutUser' %}"><button class="nav-btn">Logout</button></a>
                <a href="{% url 'Account' %}"><button class="nav-btn">Account</button></a>
                {% else %}
                <a href="{% url 'LoginUser' %}"><button class="nav-btn">Login</button></a>

                {% endif %}
            </nav>
        </div>
    </div>
</header>

{% if messages %}
<div class="message-box">
    <span class="message-icon"><i class="fa-regular fa-user"></i></span>
    {% if messages %}
    <span class="messages">
        {% for message in messages %}
        <span {% if message.tags %} class="toast {{ message.tags }}" {% endif %}>
            <p class="text-message">{{ message }}</p>
        </span>
        {% endfor %}
    </span>
    {% endif %}
</div>
{% endif %}

{% endblock navbar %}
